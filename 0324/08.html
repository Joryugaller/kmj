<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>순서가 없는 목록</h3>
    <ul type = "circle">  <!-- disc(default) | circle | square -->
        <li>조동주</li>
        <li>김민준</li>
        <li>장세은</li>
    </ul>
    <h3>순서가 있는 목록</h3>
    <ol type = "A">  <!-- 1(default) | A | a | I | i -->
        <li>ㄹㄹㄹㄹ</li>
        <li>ㄴㄴㄴㄴ</li>
        <li>ㅇㅇㅇㅇ</li>
    </ol>   
</body>
</html>
